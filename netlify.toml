[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/tbank"
  to = "/.netlify/functions/tbank"
  status = 200

[[redirects]]
  from = "/api/players/online"
  to = "/.netlify/functions/players-online"
  status = 200

[[redirects]]
  from = "/api/players/search"
  to = "/.netlify/functions/players-search"
  status = 200

[[redirects]]
  from = "/api/players/profile"
  to = "/.netlify/functions/players-profile"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
